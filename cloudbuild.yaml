steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://marketing-backend-v2-876464738390.asia-east1.run.app'
      - '--build-arg'
      - 'NEXT_PUBLIC_ZEREO_URL=https://zereo-backend-876464738390.asia-east1.run.app'
      - '-t'
      - 'asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:$COMMIT_SHA'
      - '-t'
      - 'asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:latest'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:$COMMIT_SHA'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:latest'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'marketingx-site'
      - '--image'
      - 'asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:$COMMIT_SHA'
      - '--region'
      - 'asia-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
images:
  - 'asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:$COMMIT_SHA'
  - 'asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:latest'
options:
  logging: CLOUD_LOGGING_ONLY
