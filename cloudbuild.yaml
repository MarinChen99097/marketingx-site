steps:
  # Fetch latest Salecraft-Plugin commit SHA so the install URL points to an
  # immutable commit instead of 'master' (cache-busting for AI web_fetch tools).
  # Uses `git ls-remote` (git wire protocol) instead of GitHub REST API:
  # - No rate limit (REST API is 60/hr per IP unauthenticated; Cloud Build
  #   IPs are shared with neighbors, can hit ceiling on bursty pushes)
  # - No auth needed for public repo
  # - Returns canonical SHA in one round trip
  # Fail-soft: if GitHub is unreachable, the build continues with 'master'.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'fetch-plugin-sha'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SHA=$$(git ls-remote https://github.com/connactai/Salecraft-Plugin.git refs/heads/master 2>/dev/null | awk '{print $$1}')
        if [ -z "$$SHA" ]; then
          echo "Failed to fetch plugin SHA via git ls-remote, falling back to 'master'"
          SHA="master"
        fi
        echo "Plugin SHA: $$SHA"
        echo "$$SHA" > /workspace/plugin_sha.txt
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        PLUGIN_SHA=$$(cat /workspace/plugin_sha.txt)
        docker build \
          --build-arg NEXT_PUBLIC_API_URL=https://marketing-backend-v2-876464738390.asia-east1.run.app \
          --build-arg NEXT_PUBLIC_ZEREO_URL=https://zereo-backend-876464738390.asia-east1.run.app \
          --build-arg NEXT_PUBLIC_SITE_URL=https://salecraft.ai \
          --build-arg NEXT_PUBLIC_PLUGIN_SHA=$$PLUGIN_SHA \
          --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID} \
          -t asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:$COMMIT_SHA \
          -t asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:latest \
          .
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:$COMMIT_SHA'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:latest'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'marketingx-site'
      - '--image'
      - 'asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:$COMMIT_SHA'
      - '--region'
      - 'asia-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
  # Defense-in-depth: ensure traffic always points to the latest revision.
  # `gcloud run services update` (used elsewhere for env-var/label changes)
  # silently flips traffic from `latestRevision: true` to a fixed revision
  # name, which would mean future deploys create new revisions but traffic
  # never switches over — see /CLAUDE.md "Cloud Run Traffic Routing 安全規範".
  # This step is idempotent: if traffic is already on latest, no-op.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'enforce-latest-traffic'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update-traffic'
      - 'marketingx-site'
      - '--to-latest'
      - '--region'
      - 'asia-east1'
images:
  - 'asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:$COMMIT_SHA'
  - 'asia-east1-docker.pkg.dev/gen-lang-client-0747655769/cloud-run-source-deploy/marketingx-site:latest'
# Substitutions must be supplied via the Cloud Build trigger UI
# (NEVER hardcode secrets — see /CLAUDE.md:憑證與密鑰安全規範).
substitutions:
  _GOOGLE_CLIENT_ID: ''
options:
  logging: CLOUD_LOGGING_ONLY
  substitution_option: ALLOW_LOOSE
